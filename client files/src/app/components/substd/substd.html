    <input
        type="number"
        id="textboxStudentId"
        name="textboxStudentId"
        placeholder="Enter Student Id"

    <button
        id="btnStudentDelete"
        type="button"
        (click)="DeleteStudent()">
        Delete Student
    </button>

</div>
